    # Intrinsic: 3x3 [fx,0,cx, 0,fy,cy, 0,0,1]
    intrinsic: [2334.5814226076, 0, 2004.5, 0, 2334.5814226076, 1501.5, 0, 0, 1]
    distortion_coefficients: []

